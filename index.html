
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <title>Document</title>
</head>
<body>
    <div id="app">
       <input type="text" placeholder="Enter an event here" v-model="val">
        <button @click="addEvent">Submit</button>
        <ul>
            <li v-for="(event, index) in list" @click="removeEvent(index)">{{event}}</li>
        </ul>
    </div>
    <script>
        const{createApp} = Vue
        createApp({
            data(){
                return {
                    val:"",
                    list:[]
                }
            },
            methods:{
                    addEvent(){
                        this.list.push(this.val);
                        this.val="";
                    },
                    removeEvent(index){
                        this.list.splice(index,1);
                    }
                }
            }
        ).mount("#app")
    </script>
</body>
</html>
